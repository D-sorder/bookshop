<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshop</title>
    <link rel="stylesheet" href="output/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header__logo">
                <img src="images/svg/logo.svg" alt="">
            </div>
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-link"><a href="#">books</a></li>
                    <li class="header__nav-link"><a href="#">audiobooks</a></li>
                    <li class="header__nav-link"><a href="#">stationery & gifts</a></li>
                    <li class="header__nav-link"><a href="#">blog</a></li>
                </ul>
            </nav>
            <div class="header__buttons">
                <a href="" class="header__button"><img src="images/svg/user.svg" alt=""></a>
                <a href="" class="header__button"><img src="images/svg/search.svg" alt=""></a>
                <a href="" class="header__button"><img src="images/svg/cart.svg" alt=""></a>
            </div>
        </header>
    </div>
    <div class="container">
        <main>
            <div class="slider">
                <div class="slider__hero-img">
                    <img src="" alt="">
                </div>
                <div class="slider__nav">
                    <ul class="slider__dots">
                        <li class="slider__dot"></li>
                    </ul>
                </div>
            </div>
        </main>
    </div>
    <script src="output/main.js"></script>
</body>
</html>
