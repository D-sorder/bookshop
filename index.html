<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshop</title>
    <link rel="stylesheet" href="output/main.css">
</head>
<body>
    <header class="header">
        <div class="grid">
            <div class="header__inner">
                <div class="header__logo">
                    <img src="images/svg/logo.svg" alt="">
                </div>
                <nav class="header__nav">
                    <ul class="header__nav-list">
                        <li class="header__nav-link"><a class="active" href="#">books</a></li>
                        <li class="header__nav-link"><a href="#">audiobooks</a></li>
                        <li class="header__nav-link"><a href="#">stationery & gifts</a></li>
                        <li class="header__nav-link"><a href="#">blog</a></li>
                    </ul>
                </nav>
                <div class="header__buttons">
                    <a href="" class="header__button"><img src="images/svg/user.svg" alt=""></a>
                    <a href="" class="header__button"><img src="images/svg/search.svg" alt=""></a>
                    <a href="" class="header__button"><img src="images/svg/cart.svg" alt=""></a>
                </div>
            </div>
        </div>
    </header>
    <div class="grid">
        <div class="container">
            <main>
                <div class="slider">
                    <div class="slider__hero-img">
                        <img src="images/jpg/hero1.png" class="slider__img" alt="">
                        <div class="slider__aside-link slider__aside-link_purple">
                            <a class="slider__link" href="#">change old book on new</a>
                        </div>
                        <div class="slider__aside-link slider__aside-link_pink">
                            <a class="slider__link" href="#">top 100 books 2022</a>
                        </div>
                    </div>
                    <div class="slider__nav">
                        <ul class="slider__dots">
                        </ul>
                    </div>
                </div>
                <div class="shop-list">
                    <aside class="shop-list__aside">
                        <nav class="shop-list__nav">
                            <ul class="shop-list__nav-links">
                                <li class="shop-list__nav-link"><a href="#"></a></li>
                            </ul>
                        </nav>
                    </aside>
                </div>
            </main>
        </div>
        <script src="output/main.js"></script>
    </div>
</body>
</html>
